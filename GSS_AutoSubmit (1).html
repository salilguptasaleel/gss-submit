<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSS Auto Submit</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #FF6B00, #ff9a00); padding: 16px 20px; text-align: center; }
  .header h1 { font-size: 18px; color: white; font-weight: 700; }
  .header p { font-size: 12px; color: rgba(255,255,255,0.85); margin-top: 3px; }
  .container { padding: 16px; max-width: 600px; margin: 0 auto; }
  .card { background: #16213e; border-radius: 12px; padding: 16px; margin-bottom: 14px; border: 1px solid #0f3460; }
  .card-title { font-size: 13px; font-weight: 700; color: #FF6B00; margin-bottom: 10px; text-transform: uppercase; }
  .type-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .type-btn { padding: 14px 8px; border: 2px solid #0f3460; border-radius: 10px; background: #0f3460; color: #aaa; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; }
  .type-btn.active-ms { border-color: #00b4d8; background: #023e8a; color: #00b4d8; }
  .type-btn.active-hsd { border-color: #FF6B00; background: #3d1a00; color: #FF6B00; }
  textarea { width: 100%; min-height: 180px; background: #0a0a1a; border: 1px solid #0f3460; border-radius: 8px; color: #00ff88; font-family: 'Courier New', monospace; font-size: 11px; padding: 12px; resize: vertical; }
  textarea:focus { outline: none; border-color: #FF6B00; }
  textarea::placeholder { color: #444; }
  .submit-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; margin-bottom: 14px; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .submit-btn.ms { background: linear-gradient(135deg, #0077b6, #00b4d8); color: white; }
  .submit-btn.hsd { background: linear-gradient(135deg, #FF6B00, #ff9a00); color: white; }
  .submit-btn.none { background: #333; color: #666; }
  .progress-bar { width: 100%; height: 8px; background: #0f3460; border-radius: 4px; overflow: hidden; margin-bottom: 8px; display: none; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #FF6B00, #ff9a00); border-radius: 4px; transition: width 0.3s; width: 0%; }
  .msg { text-align: center; font-size: 13px; color: #aaa; padding: 8px; display: none; }
  .status-summary { display: none; background: #0a0a1a; border-radius: 10px; padding: 14px; margin-bottom: 14px; border: 1px solid #0f3460; }
  .status-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1a1a3e; font-size: 13px; }
  .status-row:last-child { border-bottom: none; }
  .status-label { color: #888; }
  .ok { color: #00ff88; font-weight: 700; }
  .fail { color: #ff4444; font-weight: 700; }
  .info { color: #00b4d8; font-weight: 700; }
  .entries-list { display: none; margin-bottom: 14px; }
  .entry-item { background: #0a0a1a; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; border-left: 4px solid #333; font-size: 12px; transition: border-color 0.3s; }
  .entry-item.success { border-left-color: #00ff88; }
  .entry-item.failed { border-left-color: #ff4444; }
  .entry-item.pending { border-left-color: #ff9a00; }
  .entry-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .entry-type { color: #FF6B00; font-weight: 700; font-size: 11px; text-transform: uppercase; }
  .entry-party { color: #eee; font-weight: 600; font-size: 13px; }
  .entry-amount { color: #aaa; font-size: 11px; margin-top: 2px; }
  .clear-btn { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 8px; background: transparent; color: #666; font-size: 13px; cursor: pointer; }
  .clear-btn:active { border-color: #FF6B00; color: #FF6B00; }
</style>
</head>
<body>

<div class="header">
  <h1>⛽ GSS AUTO SUBMIT</h1>
  <p>JSON Paste करो → Submit करो → Form भर जाएगा</p>
</div>

<div class="container">

  <div class="card">
    <div class="card-title">Step 1 — Product चुनो</div>
    <div class="type-buttons">
      <button class="type-btn" id="btnMS" onclick="selectType('MS')">🟦 MS<br><span style="font-size:11px;font-weight:400">Petrol</span></button>
      <button class="type-btn" id="btnHSD" onclick="selectType('HSD')">🟧 HSD<br><span style="font-size:11px;font-weight:400">Diesel</span></button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Step 2 — JSON Paste करो</div>
    <textarea id="jsonInput" placeholder="यहाँ Claude का JSON paste करो..."></textarea>
  </div>

  <button class="submit-btn none" id="submitBtn" onclick="startSubmit()" disabled>पहले Product चुनो</button>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="msg" id="progressMsg"></div>

  <div class="status-summary" id="statusSummary">
    <div class="status-row"><span class="status-label">Product</span><span class="info" id="sumProduct">—</span></div>
    <div class="status-row"><span class="status-label">Total Entries</span><span class="info" id="sumTotal">—</span></div>
    <div class="status-row"><span class="status-label">✅ Success</span><span class="ok" id="sumSuccess">0</span></div>
    <div class="status-row"><span class="status-label">❌ Failed</span><span class="fail" id="sumFailed">0</span></div>
  </div>

  <div class="entries-list" id="entriesList"></div>

  <button class="clear-btn" onclick="clearAll()">🗑️ Clear — नई Entry के लिए</button>

</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzc3mNHjJvux2mO250uYIfY95SKDXnDNb7J-1kfhFD-IzGAq2Y96rEfv4d4ajkcle4J/exec";

let selectedType = null;

function selectType(type) {
  selectedType = type;
  document.getElementById('btnMS').className = 'type-btn' + (type==='MS' ? ' active-ms' : '');
  document.getElementById('btnHSD').className = 'type-btn' + (type==='HSD' ? ' active-hsd' : '');
  const btn = document.getElementById('submitBtn');
  btn.disabled = false;
  btn.className = 'submit-btn ' + type.toLowerCase();
  btn.textContent = (type==='MS' ? '🟦 MS' : '🟧 HSD') + ' Submit करो';
}

function parseJSON() {
  const text = document.getElementById('jsonInput').value;
  if (!text.trim()) throw new Error('JSON खाली है!');
  const start = text.indexOf('{');
  const end = text.lastIndexOf('}');
  if (start===-1 || end===-1) throw new Error('Valid JSON नहीं मिला!');
  return JSON.parse(text.substring(start, end+1));
}

function buildEntries(data, type) {
  const entries = [];
  const date = data.date || '';
  const shift = data.shift || 1;
  const rate = type==='HSD' ? 95.84 : 102.38;
  const salesman = data.salesman || (type==='HSD' ? 'NADEEM' : 'RAKESH');
  const product = type;

  // Udhari / Card / Payfone
  (data.udhari || []).forEach(function(u) {
    entries.push({
      label: u.ledger, type: 'CREDIT/CASH SALES', amount: u.amount,
      fields: {
        'entry.1813495916': 'CREDIT/CASH SALES', 'entry.873422406': shift,
        'entry.2083511322': u.ledger, 'entry.2034712165': u.ledger,
        'entry.932987877': 'SHOWROOM', 'entry.1275543817': product,
        'entry.1259354260': u.vehicle || '', 'entry.929797156': u.slip || '',
        'entry.267811223': u.qty, 'entry.1665648676': rate,
        'entry.392424077': u.amount, 'entry.44623335': u.category,
        'entry.298950774': u.amount, 'entry.1802588405': 0,
        'entry.1611876333': 0, 'entry.59463359': 0,
        'entry.1954062248': u.remark || 'CLAUDE',
        'entry.1785584187': u.remark || 'CLAUDE',
        'entry.26036633': salesman, 'entry.2027635795': date
      }
    });
  });

  // Cash Sale
  if (data.cash_sale) {
    var cs = data.cash_sale;
    entries.push({
      label: 'CASH SALE ' + product, type: 'CASH SALE', amount: cs.amount,
      fields: {
        'entry.1813495916': 'CREDIT/CASH SALES', 'entry.873422406': shift,
        'entry.2083511322': 'CASH SALE', 'entry.2034712165': 'CASH SALE',
        'entry.932987877': 'SHOWROOM', 'entry.1275543817': product,
        'entry.267811223': cs.qty, 'entry.1665648676': rate,
        'entry.392424077': cs.amount, 'entry.44623335': 1,
        'entry.298950774': cs.amount, 'entry.1802588405': 0,
        'entry.1611876333': 0, 'entry.59463359': 0,
        'entry.1954062248': 'CLAUDE', 'entry.1785584187': 'CLAUDE',
        'entry.26036633': salesman, 'entry.2027635795': date
      }
    });
  }

  // Bus Trip (HSD only)
  (data.bus || []).forEach(function(b) {
    var rem = b.income + '/' + (b.km||0) + '/' + b.qty + ' | CLAUDE';
    entries.push({
      label: b.bus_no_hsd + ' ' + b.route, type: 'BUS TRIP', amount: b.income,
      fields: {
        'entry.1813495916': 'BUS TRIP', 'entry.873422406': shift,
        'entry.2083511322': b.bus_no_hsd, 'entry.2034712165': b.route,
        'entry.932987877': '', 'entry.126699155': b.driver || '',
        'entry.1275543817': 'HSD', 'entry.1259354260': b.bus_no,
        'entry.929797156': b.slip || '', 'entry.267811223': b.qty,
        'entry.1665648676': 95.84, 'entry.169298120': b.km || 0,
        'entry.1661679204': b.slip_last4 || '', 'entry.1479371877': b.income,
        'entry.392424077': b.net, 'entry.44623335': 3,
        'entry.298950774': b.hsd_amount,
        'entry.1954062248': rem, 'entry.26036633': salesman,
        'entry.1785584187': b.balance, 'entry.2027635795': date
      }
    });
  });

  // Mobil (MS only)
  (data.mobil || []).forEach(function(m) {
    entries.push({
      label: m.product, type: 'MOBIL', amount: m.amount,
      fields: {
        'entry.1813495916': 'CREDIT/CASH SALES', 'entry.873422406': shift,
        'entry.2083511322': 'CASH SALE', 'entry.2034712165': 'CASH SALE',
        'entry.932987877': 'SHOWROOM', 'entry.1275543817': m.product,
        'entry.267811223': m.qty, 'entry.1665648676': m.rate,
        'entry.392424077': m.amount, 'entry.44623335': 1,
        'entry.298950774': m.amount, 'entry.1802588405': m.rate_wo_gst,
        'entry.1611876333': m.gst1, 'entry.59463359': m.gst2,
        'entry.1954062248': m.remark || 'CLAUDE',
        'entry.1785584187': m.remark || 'CLAUDE',
        'entry.26036633': salesman, 'entry.2027635795': date
      }
    });
  });

  // Receipt
  (data.receipt || []).forEach(function(r) {
    entries.push({
      label: r.ledger, type: 'RECIPT', amount: r.amount,
      fields: {
        'entry.1813495916': 'RECIPT', 'entry.873422406': shift,
        'entry.2083511322': r.account_head, 'entry.2034712165': r.ledger,
        'entry.932987877': r.amount,
        'entry.1259354260': r.remark || 'CLAUDE',
        'entry.929797156': salesman, 'entry.2027635795': date
      }
    });
  });

  // Payment
  (data.payment || []).forEach(function(p) {
    entries.push({
      label: p.ledger, type: 'PAYMENT', amount: p.amount,
      fields: {
        'entry.1813495916': 'PAYMENT', 'entry.873422406': shift,
        'entry.2083511322': p.account_head, 'entry.2034712165': p.ledger,
        'entry.932987877': '', 'entry.126699155': p.amount,
        'entry.1259354260': p.narration || 'CLAUDE',
        'entry.929797156': salesman, 'entry.2027635795': date
      }
    });
  });

  return entries;
}

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

async function submitEntry(fields) {
  const resp = await fetch(WEB_APP_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields: fields })
  });
  const result = await resp.json();
  return result;
}

async function startSubmit() {
  if (!selectedType) { alert('पहले MS या HSD चुनो!'); return; }

  let data;
  try { data = parseJSON(); } catch(e) { alert('JSON Error: ' + e.message); return; }

  const entries = buildEntries(data, selectedType);
  if (entries.length === 0) { alert('कोई entry नहीं मिली JSON में!'); return; }

  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').textContent = 'Submitting...';
  document.getElementById('progressBar').style.display = 'block';
  document.getElementById('progressMsg').style.display = 'block';
  document.getElementById('statusSummary').style.display = 'block';
  document.getElementById('entriesList').style.display = 'block';
  document.getElementById('entriesList').innerHTML = '';
  document.getElementById('sumProduct').textContent = selectedType + ' | Shift ' + (data.shift||1);
  document.getElementById('sumTotal').textContent = entries.length;
  document.getElementById('sumSuccess').textContent = '0';
  document.getElementById('sumFailed').textContent = '0';

  let success = 0, failed = 0;

  for (let i = 0; i < entries.length; i++) {
    const entry = entries[i];
    const pct = Math.round((i / entries.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressMsg').textContent = (i+1) + '/' + entries.length + ' — ' + entry.label;

    const div = document.createElement('div');
    div.className = 'entry-item pending';
    div.innerHTML = '<div class="entry-top"><span class="entry-type">' + entry.type + '</span><span id="es_' + i + '">⏳</span></div><div class="entry-party">' + entry.label + '</div><div class="entry-amount">₹' + entry.amount + '</div>';
    document.getElementById('entriesList').appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    try {
      const result = await submitEntry(entry.fields);
      if (result.success) {
        success++;
        document.getElementById('es_' + i).textContent = '✅';
        div.className = 'entry-item success';
      } else {
        failed++;
        document.getElementById('es_' + i).textContent = '❌';
        div.className = 'entry-item failed';
      }
    } catch(e) {
      failed++;
      document.getElementById('es_' + i).textContent = '❌';
      div.className = 'entry-item failed';
    }

    document.getElementById('sumSuccess').textContent = success;
    document.getElementById('sumFailed').textContent = failed;
    await sleep(500);
  }

  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressMsg').textContent = 'Done! ' + success + '/' + entries.length + ' ✅';
  document.getElementById('submitBtn').textContent = 'Done ✅ ' + success + '/' + entries.length;
}

function clearAll() {
  selectedType = null;
  document.getElementById('jsonInput').value = '';
  document.getElementById('btnMS').className = 'type-btn';
  document.getElementById('btnHSD').className = 'type-btn';
  const btn = document.getElementById('submitBtn');
  btn.className = 'submit-btn none';
  btn.textContent = 'पहले Product चुनो';
  btn.disabled = true;
  document.getElementById('progressBar').style.display = 'none';
  document.getElementById('progressMsg').style.display = 'none';
  document.getElementById('statusSummary').style.display = 'none';
  document.getElementById('entriesList').style.display = 'none';
  document.getElementById('entriesList').innerHTML = '';
  document.getElementById('progressFill').style.width = '0%';
}
</script>
</body>
</html>
